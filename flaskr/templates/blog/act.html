{% extends 'base.html' %}

{% block header %}
  <h1>{% block title %}New Post{% endblock %}</h1>
{% endblock %}

{% block content %}
  <form method="post">
    <label for="turn_action">Action</label>
    <input name="turn_action" id="turn_action" value="{{ request.form['turn_action'] }}" required>
    <label for="turn_description">Description</label>
    <textarea name="turn_description" id="turn_description">{{ request.form['turn_description'] }}</textarea>
    <input type="submit" value="Save">
  </form>
{% endblock %}
